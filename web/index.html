<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSFloat Sniper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0d14;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: #13161f;
      border-bottom: 1px solid #1e2235;
      flex-shrink: 0;
    }
    .logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .logo em { color: #22c55e; font-style: normal; }

    #status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #475569;
    }
    #dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #374151;
      transition: background 0.3s;
    }
    #dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e99; }

    /* ── Tabs ───────────────────────────────────────── */
    .tabs-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: #13161f;
      border-bottom: 1px solid #1e2235;
      flex-shrink: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #475569;
      background: none;
      letter-spacing: 0.03em;
    }
    .tab:hover { color: #94a3b8; background: #1a1d2e; }

    .tab.active[data-tab="all"]     { color: #e2e8f0; background: #1e2235; border-color: #2d3150; }
    .tab.active[data-tab="price"]   { color: #4ade80; background: #052e16; border-color: #166534; }
    .tab.active[data-tab="float"]   { color: #60a5fa; background: #0c1a38; border-color: #1e40af; }
    .tab.active[data-tab="pattern"] { color: #c084fc; background: #1a0938; border-color: #6b21a8; }

    .tab-count {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
      transition: all 0.15s;
    }
    .tab[data-tab="all"]     .tab-count { background: #1e2235; color: #64748b; }
    .tab[data-tab="price"]   .tab-count { background: #14532d; color: #4ade80; }
    .tab[data-tab="float"]   .tab-count { background: #1e3a5f; color: #60a5fa; }
    .tab[data-tab="pattern"] .tab-count { background: #3b1764; color: #c084fc; }

    /* ── Cards area ─────────────────────────────────── */
    .cards-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
      align-items: start;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: #13161f;
      border: 1px solid #1e2235;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #2d3150;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px #0006;
    }
    .card[data-strategy="price"]   { border-top: 2px solid #22c55e; }
    .card[data-strategy="float"]   { border-top: 2px solid #38bdf8; }
    .card[data-strategy="pattern"] { border-top: 2px solid #a855f7; }

    @keyframes flash-price   { 0% { box-shadow: 0 0 0 2px #22c55e66, 0 0 20px #22c55e33; } 100% { box-shadow: none; } }
    @keyframes flash-float   { 0% { box-shadow: 0 0 0 2px #38bdf866, 0 0 20px #38bdf833; } 100% { box-shadow: none; } }
    @keyframes flash-pattern { 0% { box-shadow: 0 0 0 2px #a855f766, 0 0 20px #a855f733; } 100% { box-shadow: none; } }

    .card[data-strategy="price"].new   { animation: flash-price   1.8s ease-out; }
    .card[data-strategy="float"].new   { animation: flash-float   1.8s ease-out; }
    .card[data-strategy="pattern"].new { animation: flash-pattern 1.8s ease-out; }

    /* ── Card meta bar ──────────────────────────────── */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 6px;
    }
    .badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .badge-price   { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .badge-float   { background: #0c1a38; color: #60a5fa; border: 1px solid #1e40af; }
    .badge-pattern { background: #1a0938; color: #c084fc; border: 1px solid #6b21a8; }
    .card-age { font-size: 10px; color: #374151; }

    /* ── Card item row ──────────────────────────────── */
    .card-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px 10px;
    }
    .card-img {
      width: 72px; height: 54px;
      object-fit: contain;
      background: #0b0d14;
      border-radius: 6px;
      border: 1px solid #1e2235;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 12px;
      font-weight: 600;
      color: #cbd5e1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      text-decoration: none;
      line-height: 1.3;
    }
    .card-name:hover { color: #fff; }
    .card-cond { font-size: 10px; color: #475569; margin-top: 3px; }
    .sp-tag { color: #f59e0b; margin-left: 5px; }

    /* ── Stats grid ─────────────────────────────────── */
    .card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid #1e2235;
    }
    .stat {
      padding: 9px 8px;
      text-align: center;
      border-right: 1px solid #1e2235;
    }
    .stat:last-child { border-right: none; }
    .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #374151;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1;
    }
    .stat-value.sm { font-size: 11px; font-family: monospace; font-weight: 400; }

    /* Discount color scale */
    .disc-great  { color: #22c55e; }
    .disc-good   { color: #86efac; }
    .disc-mid    { color: #facc15; }
    .disc-low    { color: #64748b; }
    .disc-neg    { color: #f87171; }

    /* Float color scale */
    .float-elite  { color: #38bdf8; }
    .float-great  { color: #22c55e; }
    .float-good   { color: #86efac; }
    .float-ok     { color: #64748b; }

    /* Liquidity badge */
    .liq-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .liq-high   { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .liq-medium { background: #2d2000; color: #fbbf24; border: 1px solid #78350f; }
    .liq-low    { background: #1a0000; color: #f87171; border: 1px solid #7f1d1d; }
    .liq-none   { background: #0f172a; color: #475569; border: 1px solid #1e2235; }

    /* ── Ref prices row ─────────────────────────────── */
    .card-refs {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-top: 1px solid #1e2235;
      font-size: 11px;
    }
    .ref-buff   { color: #f59e0b; }
    .ref-youpin { color: #38bdf8; }
    .ref-lbl    { font-size: 9px; font-weight: 700; opacity: 0.6; margin-right: 2px; }
    .ref-save   { margin-left: auto; font-size: 10px; color: #22c55e; font-weight: 600; }

    /* ── Buy button ─────────────────────────────────── */
    .card-footer { padding: 10px 12px; }
    .btn-buy {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s;
      letter-spacing: 0.04em;
    }
    .card[data-strategy="price"]   .btn-buy { background: #15803d; color: #fff; }
    .card[data-strategy="float"]   .btn-buy { background: #1d4ed8; color: #fff; }
    .card[data-strategy="pattern"] .btn-buy { background: #7e22ce; color: #fff; }
    .btn-buy:hover:not(:disabled) { filter: brightness(1.15); }
    .btn-buy:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-buy.success  { background: #16a34a !important; }
    .btn-buy.error    { background: #dc2626 !important; }

    /* ── Empty state ────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: #1e2235;
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty strong { display: block; font-size: 14px; color: #2d3150; margin-bottom: 6px; }
    .empty span { font-size: 11px; color: #1e2235; }
  </style>
</head>
<body>

<header>
  <div class="logo">CSFloat <em>Sniper</em></div>
  <div id="status">
    <div id="dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab" data-tab="all">All <span class="tab-count" id="count-all">0</span></button>
  <button class="tab active" data-tab="price">Price <span class="tab-count" id="count-price">0</span></button>
  <button class="tab" data-tab="float">Float <span class="tab-count" id="count-float">0</span></button>
  <button class="tab" data-tab="pattern">Pattern <span class="tab-count" id="count-pattern">0</span></button>
</div>

<div class="cards-wrap">
  <div class="cards-grid" id="cards-grid">
    <div class="empty" id="empty-state">
      <div class="empty-icon">⟳</div>
      <strong>No deals yet</strong>
      <span>Waiting for listings matching your rules…</span>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
